[build]
  publish = "."

# ルート(/)にアクセスしたら投資信託シミュレーターを表示
[[redirects]]
  from = "/"
  to = "/investment-simulator.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
